<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC-LARC Visualizations</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/1.9.1/showdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-jsonview/1.2.3/jquery.jsonview.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/jquery-jsonview/1.2.3/jquery.jsonview.min.css" rel="stylesheet" />
    <style>
        #version-selector {
            margin: 20px 0;
            text-align: center;
        }
        #version-select {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f8f8f8;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #version-select:hover {
            background-color: #e8e8e8;
        }
        #version-select option {
            padding: 10px;
        }
    </style>
</head>
<body>
    <div id="version-selector">
        <label for="version-select">Select Version:</label>
        <select id="version-select" onchange="changeVersion(this.value)">
            <option value="self-feedback">🔄 self-feedback</option>
            <option value="constraint">👤 constraint</option>
            <option value="original">🤖 origianal</option>
        </select>
    </div>
    <h2 id="version-title"></h2>
    <div id="file-list"></div>
    <div id="content"></div>

    <script src="scripts.js"></script>
</body>
</html>
